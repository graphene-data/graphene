name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CI: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: ./ui
      - name: Lang tests
        run: pnpm -C lang test
      - name: CLI tests
        run: pnpm -C cli test
      - name: Create tests
        run: pnpm -C create test
      - name: UI tests
        run: pnpm -C ui test
      - name: Upload failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: UI test diffs
          path: ui/tests/results/**

  test-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {lfs: true}
      - uses: ./.github/actions/setup
      - run: pnpm test ui/tests/install.test.ts
        env: {SLOW_TEST: '1'}

  test-schema:
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4
        with: {lfs: true}
      - uses: ./.github/actions/setup
      - run: pnpm test cli/schema.test.ts
        env:
          SLOW_TEST: '1'
          GOOGLE_CREDENTIALS_CONTENT: ${{ secrets.GOOGLE_CREDENTIALS_CONTENT }}
          SNOWFLAKE_PRI_KEY: ${{ secrets.SNOWFLAKE_PRI_KEY }}
          SNOWFLAKE_PRI_PASSPHRASE: graphenedata
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}

  test-examples:
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4
        with: {lfs: true}
      - uses: ./.github/actions/setup
      - run: pnpm test ui/tests/run-examples.test.ts
        env:
          SLOW_TEST: '1'
          GOOGLE_CREDENTIALS_CONTENT: ${{ secrets.GOOGLE_CREDENTIALS_CONTENT }}
          SNOWFLAKE_PRI_KEY: ${{ secrets.SNOWFLAKE_PRI_KEY }}
          SNOWFLAKE_PRI_PASSPHRASE: graphenedata
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
