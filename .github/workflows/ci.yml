name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CI: true

permissions:
  contents: read

jobs:
  check-commit-authors:
    if: github.event_name == 'pull_request' && github.repository == 'graphene-data/graphene'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check commit authors
        uses: actions/github-script@v7
        with:
          script: |
            const APPROVED_FILE = '.github/APPROVED_CONTRIBUTORS';
            const defaultBranch = context.payload.repository.default_branch;

            async function getTextFile(path) {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: defaultBranch,
              });

              if (!('content' in data) || typeof data.content !== 'string') {
                throw new Error(`Expected file content for ${path}`);
              }

              return Buffer.from(data.content, 'base64').toString('utf8');
            }

            function parseList(content) {
              return content.split('\n').map(line => line.trim()).filter(line => line && !line.startsWith('#'));
            }

            function parseApprovedContributors(content) {
              return new Map(parseList(content).map(line => {
                const [user, email, extra] = line.split(/\s+/);
                if (extra) throw new Error(`Expected "username" or "username email" in ${APPROVED_FILE}: ${line}`);
                return [user.toLowerCase(), email?.toLowerCase() ?? null];
              }));
            }

            const approvedContributors = parseApprovedContributors(await getTextFile(APPROVED_FILE));
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const failures = [];
            for (const commit of commits) {
              const sha = commit.sha.slice(0, 12);
              const authorName = commit.commit.author?.name ?? '(unknown)';
              const authorEmail = commit.commit.author?.email ?? '';
              const authorLogin = commit.author?.login?.toLowerCase();
              const authorLabel = authorEmail ? `${authorName} <${authorEmail}>` : authorName;

              if (!authorLogin) {
                failures.push(`${sha}: ${authorLabel} is not associated with a GitHub user`);
                continue;
              }

              if (!approvedContributors.has(authorLogin)) {
                failures.push(`${sha}: ${authorLabel} is associated with unapproved GitHub user @${authorLogin}`);
                continue;
              }

              const requiredEmail = approvedContributors.get(authorLogin);
              if (requiredEmail && authorEmail.toLowerCase() !== requiredEmail) {
                failures.push(`${sha}: ${authorLabel} is associated with @${authorLogin}, but must use ${requiredEmail}`);
              }
            }

            if (failures.length === 0) {
              console.log(`All ${commits.length} commit authors are approved`);
              return;
            }

            core.setFailed([
              'Found commits with unexpected authors:',
              ...failures.map(failure => `  - ${failure}`),
              '',
              `Approved GitHub users and any required author emails are listed in ${APPROVED_FILE}.`,
            ].join('\n'));

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: ./ui
      - name: Lang tests
        run: pnpm -C lang test
      - name: CLI tests
        run: pnpm -C cli test
      - name: Create tests
        run: pnpm -C create test
      - name: UI tests
        run: pnpm -C ui test
      - name: Upload failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: UI test diffs
          path: ui/tests/results/**

  test-vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install VS Code runtime dependencies
        run: sudo apt-get update && sudo apt-get install -y libgbm1 libgtk-3-0 libnss3 libxss1 xvfb
      - name: VS Code extension e2e tests
        run: xvfb-run -a pnpm -C vscode test:e2e

  test-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {lfs: true}
      - uses: ./.github/actions/setup
      - run: pnpm test ui/tests/install.test.ts
        env: {SLOW_TEST: '1'}
      - name: Upload failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: UI test diffs
          path: ui/tests/results/**


  test-schema:
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4
        with: {lfs: true}
      - uses: ./.github/actions/setup
      - run: pnpm test cli/schema.test.ts
        env:
          SLOW_TEST: '1'
          GOOGLE_CREDENTIALS_CONTENT: ${{ secrets.GOOGLE_CREDENTIALS_CONTENT }}
          SNOWFLAKE_PRI_KEY: ${{ secrets.SNOWFLAKE_PRI_KEY }}
          SNOWFLAKE_PRI_PASSPHRASE: graphenedata
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.ATHENA_TEST_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.ATHENA_TEST_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
      - name: Upload failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: UI test diffs
          path: ui/tests/results/**


  test-examples:
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4
        with: {lfs: true}
      - uses: ./.github/actions/setup
      - run: pnpm test ui/tests/run-examples.test.ts
        env:
          SLOW_TEST: '1'
          GOOGLE_CREDENTIALS_CONTENT: ${{ secrets.GOOGLE_CREDENTIALS_CONTENT }}
          SNOWFLAKE_PRI_KEY: ${{ secrets.SNOWFLAKE_PRI_KEY }}
          SNOWFLAKE_PRI_PASSPHRASE: graphenedata
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.ATHENA_TEST_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.ATHENA_TEST_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
      - name: Upload failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: UI test diffs
          path: ui/tests/results/**
