name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CI: true

jobs:
  check-commit-authors:
    if: github.event_name == 'pull_request' && github.repository == 'graphene-data/graphene'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check commit authors
        run: |
          bad_commits=$(git log HEAD^1..HEAD^2 --format='%H%x09%an <%ae>%x09%s' | awk -F '\t' '
            $2 != "Grant <grant@graphenedata.com>" &&
            $2 != "Dylan Scott <dylan@graphenedata.com>" &&
            $2 != "Kevin Marr <kevin@graphenedata.com>" { print }
          ')

          if [ -n "$bad_commits" ]; then
            echo "Found commits with unexpected authors:"
            echo "$bad_commits"
            echo ""
            echo "Expected one of:"
            echo "  Grant <grant@graphenedata.com>"
            echo "  Dylan Scott <dylan@graphenedata.com>"
            echo "  Kevin Marr <kevin@graphenedata.com>"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: ./ui
      - name: Lang tests
        run: pnpm -C lang test
      - name: CLI tests
        run: pnpm -C cli test
      - name: Create tests
        run: pnpm -C create test
      - name: UI tests
        run: pnpm -C ui test
      - name: Upload failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: UI test diffs
          path: ui/tests/results/**

  test-vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install VS Code runtime dependencies
        run: sudo apt-get update && sudo apt-get install -y libgbm1 libgtk-3-0 libnss3 libxss1 xvfb
      - name: VS Code extension e2e tests
        run: xvfb-run -a pnpm -C vscode test:e2e

  test-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {lfs: true}
      - uses: ./.github/actions/setup
      - run: pnpm test ui/tests/install.test.ts
        env: {SLOW_TEST: '1'}
      - name: Upload failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: UI test diffs
          path: ui/tests/results/**


  test-schema:
    runs-on: ubuntu-latest
    environment: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: graphene
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d graphene"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with: {lfs: true}
      - uses: ./.github/actions/setup
      - name: Seed Postgres example
        run: pnpm -C examples/postgres seed
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: '5432'
          POSTGRES_DATABASE: graphene
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
      - run: pnpm test cli/schema.test.ts
        env:
          SLOW_TEST: '1'
          GOOGLE_CREDENTIALS_CONTENT: ${{ secrets.GOOGLE_CREDENTIALS_CONTENT }}
          SNOWFLAKE_PRI_KEY: ${{ secrets.SNOWFLAKE_PRI_KEY }}
          SNOWFLAKE_PRI_PASSPHRASE: graphenedata
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          POSTGRES_HOST: localhost
          POSTGRES_PORT: '5432'
          POSTGRES_DATABASE: graphene
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
      - name: Upload failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: UI test diffs
          path: ui/tests/results/**


  test-examples:
    runs-on: ubuntu-latest
    environment: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: graphene
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d graphene"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with: {lfs: true}
      - uses: ./.github/actions/setup
      - name: Seed Postgres example
        run: pnpm -C examples/postgres seed
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: '5432'
          POSTGRES_DATABASE: graphene
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
      - run: pnpm test ui/tests/run-examples.test.ts
        env:
          SLOW_TEST: '1'
          GOOGLE_CREDENTIALS_CONTENT: ${{ secrets.GOOGLE_CREDENTIALS_CONTENT }}
          SNOWFLAKE_PRI_KEY: ${{ secrets.SNOWFLAKE_PRI_KEY }}
          SNOWFLAKE_PRI_PASSPHRASE: graphenedata
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
          POSTGRES_HOST: localhost
          POSTGRES_PORT: '5432'
          POSTGRES_DATABASE: graphene
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
      - name: Upload failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: UI test diffs
          path: ui/tests/results/**
