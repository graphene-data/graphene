packages:
  - lang
  - cli
  - create
  - ui
  - agent
  - language-server
  - vscode
  - examples/*

allowBuilds:
  esbuild: true

# avoid using a package that was released in the last 3 days, for security.
# Use minimumReleaseAgeExclude to bump past a known vulnerability
minimumReleaseAge: 4320

minimumReleaseAgeExclude:
  - serialize-javascript

overrides:
  serialize-javascript: 7.0.3

onlyBuiltDependencies:
  - '@vscode/vsce-sign'
  - duckdb
  - esbuild
  - svelte-preproces
